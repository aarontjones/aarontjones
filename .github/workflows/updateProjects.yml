name: Update portfolio projects

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # every 24 hours, it runs to update portfolios
  workflow_dispatch: # manual run button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run script
        run: node scripts/generate-projects.js

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/projects.json
          git commit -m "Update projects list" || echo "No changes"
          git push

      - name: Trigger GitHub Pages redeploy
        if: success()
        run: |
          # Make a dummy commit to trigger Pages rebuild if there are no changes
          git commit --allow-empty -m "Trigger GitHub Pages redeploy [ci skip]"
          git push
